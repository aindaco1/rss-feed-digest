name: Daily Digest

on:
  schedule:
    # GitHub schedules run in UTC. These two entries cover 7:00 AM America/Denver
    # in both daylight time (MDT, UTC-6) and standard time (MST, UTC-7).
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      start:
        description: "Optional start datetime, interpreted in America/Denver if no offset is provided"
        required: false
        type: string
      end:
        description: "Optional end datetime, interpreted in America/Denver if no offset is provided"
        required: false
        type: string
      test_window:
        description: "Use 2026-05-30 07:00 through 2026-06-01 07:00 America/Denver"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Write artifacts without sending email"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      OPENAI_EMBEDDING_MODEL: ${{ vars.OPENAI_EMBEDDING_MODEL || 'text-embedding-3-small' }}
      FEED_CONCURRENCY: ${{ vars.FEED_CONCURRENCY || '2' }}
      FEED_FETCH_ATTEMPTS: ${{ vars.FEED_FETCH_ATTEMPTS || '4' }}
      FEEDBIN_PER_PAGE: ${{ vars.FEEDBIN_PER_PAGE || '100' }}
      FEEDBIN_SYNC_SUBSCRIPTIONS: ${{ vars.FEEDBIN_SYNC_SUBSCRIPTIONS || 'true' }}
      FEEDBIN_SYNC_EXTRA_TITLES: ${{ vars.FEEDBIN_SYNC_EXTRA_TITLES || 'Joblo' }}
      FEEDBIN_PREFER_FOR_BACKFILLS: ${{ vars.FEEDBIN_PREFER_FOR_BACKFILLS || 'true' }}
      FEEDBIN_BACKFILL_AFTER_HOURS: ${{ vars.FEEDBIN_BACKFILL_AFTER_HOURS || '6' }}
      OVERCAST_SYNC_SUBSCRIPTIONS: ${{ vars.OVERCAST_SYNC_SUBSCRIPTIONS || 'false' }}
      OVERCAST_TOPIC: ${{ vars.OVERCAST_TOPIC || 'Podcasts' }}
      OVERCAST_MAX_SUBSCRIPTIONS: ${{ vars.OVERCAST_MAX_SUBSCRIPTIONS || '0' }}
      OVERCAST_MAX_EPISODES_PER_FEED: ${{ vars.OVERCAST_MAX_EPISODES_PER_FEED || '0' }}
      OVERCAST_OPML_ENCRYPTED_PATH: ${{ vars.OVERCAST_OPML_ENCRYPTED_PATH || 'config/overcast-all-data.opml.gpg' }}
      OVERCAST_SKIP_UNAVAILABLE: ${{ vars.OVERCAST_SKIP_UNAVAILABLE || 'true' }}
      OVERCAST_CHECK_CONCURRENCY: ${{ vars.OVERCAST_CHECK_CONCURRENCY || '5' }}
      YOUTUBE_SYNC_SUBSCRIPTIONS: ${{ vars.YOUTUBE_SYNC_SUBSCRIPTIONS || 'false' }}
      YOUTUBE_TOPIC: ${{ vars.YOUTUBE_TOPIC || 'YouTube' }}
      YOUTUBE_MAX_SUBSCRIPTIONS: ${{ vars.YOUTUBE_MAX_SUBSCRIPTIONS || '0' }}
      VIDEO_LITE_URL_TEMPLATE: ${{ vars.VIDEO_LITE_URL_TEMPLATE || '' }}
      SUBSTACK_ARCHIVE_LIMIT: ${{ vars.SUBSTACK_ARCHIVE_LIMIT || '30' }}
      ALLOW_PARTIAL_DIGEST_SEND: ${{ vars.ALLOW_PARTIAL_DIGEST_SEND || 'false' }}
      USE_EMBEDDINGS: ${{ vars.USE_EMBEDDINGS || 'true' }}
      FETCH_OG_IMAGES: ${{ vars.FETCH_OG_IMAGES || 'true' }}
    steps:
      - name: Decide whether to run
        id: mode
        shell: bash
        run: |
          should_run=true
          send=false

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            denver_offset="$(TZ=America/Denver date +%z)"
            schedule="${{ github.event.schedule }}"

            case "${schedule}:${denver_offset}" in
              "0 13 * * *:-0600"|"0 14 * * *:-0700")
                send=true
                ;;
              *)
                should_run=false
                echo "Skipping ${schedule}; current America/Denver offset is ${denver_offset}."
                ;;
            esac
          elif [[ "${{ inputs.dry_run }}" != "true" ]]; then
            send=true
          fi

          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"
          echo "send=${send}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.mode.outputs.should_run == 'true'
        # actions/checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        if: steps.mode.outputs.should_run == 'true'
        # actions/setup-node v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.mode.outputs.should_run == 'true'
        run: npm ci

      - name: Run tests
        if: steps.mode.outputs.should_run == 'true'
        run: npm test

      - name: Validate feed config
        if: steps.mode.outputs.should_run == 'true'
        run: npm run validate:feeds

      - name: Decrypt Overcast all-data OPML
        if: steps.mode.outputs.should_run == 'true' && env.OVERCAST_SYNC_SUBSCRIPTIONS == 'true'
        env:
          OVERCAST_OPML_GPG_PASSPHRASE: ${{ secrets.OVERCAST_OPML_GPG_PASSPHRASE }}
        shell: bash
        run: |
          if [[ ! -f "${OVERCAST_OPML_ENCRYPTED_PATH}" ]]; then
            echo "No encrypted Overcast OPML found at ${OVERCAST_OPML_ENCRYPTED_PATH}; using configured OPML secrets if present."
            exit 0
          fi

          if [[ -z "${OVERCAST_OPML_GPG_PASSPHRASE}" ]]; then
            echo "::error::OVERCAST_OPML_GPG_PASSPHRASE is required to decrypt ${OVERCAST_OPML_ENCRYPTED_PATH}."
            exit 1
          fi

          decrypted_path="${RUNNER_TEMP}/overcast-all-data.opml"
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${OVERCAST_OPML_GPG_PASSPHRASE}" \
            --output "${decrypted_path}" \
            --decrypt "${OVERCAST_OPML_ENCRYPTED_PATH}"

          echo "OVERCAST_OPML_PATH=${decrypted_path}" >> "${GITHUB_ENV}"

      - name: Check send environment
        if: steps.mode.outputs.should_run == 'true' && steps.mode.outputs.send == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          FEEDBIN_EMAIL: ${{ secrets.FEEDBIN_EMAIL }}
          FEEDBIN_PASSWORD: ${{ secrets.FEEDBIN_PASSWORD }}
          OVERCAST_OPML: ${{ secrets.OVERCAST_OPML }}
          OVERCAST_OPML_BASE64: ${{ secrets.OVERCAST_OPML_BASE64 }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: npm run check:env

      - name: Sync Feedbin subscriptions
        if: steps.mode.outputs.should_run == 'true' && steps.mode.outputs.send == 'true' && env.FEEDBIN_SYNC_SUBSCRIPTIONS == 'true'
        env:
          FEEDBIN_EMAIL: ${{ secrets.FEEDBIN_EMAIL }}
          FEEDBIN_PASSWORD: ${{ secrets.FEEDBIN_PASSWORD }}
        run: npm run feedbin:sync

      - name: Sync Overcast subscriptions
        if: steps.mode.outputs.should_run == 'true' && env.OVERCAST_SYNC_SUBSCRIPTIONS == 'true'
        env:
          OVERCAST_OPML: ${{ secrets.OVERCAST_OPML }}
          OVERCAST_OPML_BASE64: ${{ secrets.OVERCAST_OPML_BASE64 }}
        run: npm run overcast:sync

      - name: Sync YouTube subscriptions
        if: steps.mode.outputs.should_run == 'true' && env.YOUTUBE_SYNC_SUBSCRIPTIONS == 'true'
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: npm run youtube:sync

      - name: Build digest
        if: steps.mode.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          FEEDBIN_EMAIL: ${{ secrets.FEEDBIN_EMAIL }}
          FEEDBIN_PASSWORD: ${{ secrets.FEEDBIN_PASSWORD }}
          OVERCAST_OPML: ${{ secrets.OVERCAST_OPML }}
          OVERCAST_OPML_BASE64: ${{ secrets.OVERCAST_OPML_BASE64 }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        shell: bash
        run: |
          args=()

          if [[ "${{ steps.mode.outputs.send }}" == "true" ]]; then
            args+=(--send)
          else
            args+=(--dry-run)
          fi

          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            if [[ "${{ inputs.test_window }}" == "true" ]]; then
              args+=(--test-window)
            fi

            if [[ -n "${{ inputs.start }}" ]]; then
              args+=(--start "${{ inputs.start }}")
            fi

            if [[ -n "${{ inputs.end }}" ]]; then
              args+=(--end "${{ inputs.end }}")
            fi
          fi

          node src/digest/runDigest.js "${args[@]}"

      - name: Upload digest artifacts
        if: always() && steps.mode.outputs.should_run == 'true'
        # actions/upload-artifact v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: digest-output
          path: out/
          if-no-files-found: ignore
